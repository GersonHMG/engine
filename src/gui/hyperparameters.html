<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controller Settings</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding: 20px;
            background-color: #1e1e1e;
            color: white;
            margin: 0;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .section {
            background-color: #2a2a2a;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .row:last-child {
            margin-bottom: 0;
        }

        label {
            font-size: 0.9em;
            color: #ccc;
        }

        input[type="number"] {
            width: 80px;
            padding: 4px;
            background-color: #3c3c3c;
            color: white;
            border: 1px solid #555;
            border-radius: 3px;
        }

        .btn-container {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        #btn-cancel {
            background-color: #444;
        }

        #btn-cancel:hover {
            background-color: #555;
        }

        #btn-save {
            background-color: #2e7d32;
        }

        #btn-save:hover {
            background-color: #388e3c;
        }
    </style>
</head>

<body>
    <h3>Controller Parameters</h3>
    <div class="section">
        <div class="row" data-controller="lookahead"><label>Lateral KP:</label><input type="number" id="ctrl-lat-kp"
                value="3.0" step="0.1"></div>
        <div class="row" data-controller="lookahead"><label>Lateral KI:</label><input type="number" id="ctrl-lat-ki"
                value="0.1" step="0.1"></div>
        <div class="row" data-controller="lookahead"><label>Lateral KD:</label><input type="number" id="ctrl-lat-kd"
                value="0.5" step="0.1"></div>
        <div class="row" data-controller="lookahead"><label>Speed KP:</label><input type="number" id="ctrl-speed-kp"
                value="2.0" step="0.1"></div>
        <div class="row" data-controller="lookahead"><label>Heading KP:</label><input type="number" id="ctrl-head-kp"
                value="4.0" step="0.1"></div>
        <div class="row" data-controller="lookahead"><label>Target Speed:</label><input type="number"
                id="ctrl-target-speed" value="1.0" step="0.1">
        </div>
        <div class="row" data-controller="lookahead"><label>Lookahead Dist:</label><input type="number"
                id="ctrl-lookahead" value="0.25" step="0.05"></div>
        <div class="row" data-controller="bangbang"><label>BangBang Max Accel:</label><input type="number"
                id="ctrl-bb-amax" value="2.5" step="0.1"></div>
        <div class="row" data-controller="bangbang"><label>BangBang Max Vel:</label><input type="number"
                id="ctrl-bb-vmax" value="5.0" step="0.1">
        </div>
        <div class="row" data-controller="pid"><label>PID KP:</label><input type="number" id="ctrl-pid-kp" value="2.0"
                step="0.1"></div>
        <div class="row" data-controller="pid"><label>PID Max Vel:</label><input type="number" id="ctrl-pid-maxv"
                value="1.5" step="0.1">
        </div>
    </div>
    <div class="btn-container">
        <button id="btn-cancel">Cancel</button>
        <button id="btn-save">Save & Close</button>
    </div>
    <script type="module" src="hyperparameters.js"></script>
</body>

</html>
