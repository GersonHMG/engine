<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sysmic Engine Visualization</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="top-nav">
        <button id="nav-btn-connection" class="nav-btn active">Connection</button>
        <button id="nav-btn-control" class="nav-btn">
            Control <span id="control-active-indicator" class="active-indicator"></span>
        </button>
    </div>

    <div id="content-wrapper">
        <div id="sidebar">
            <h3>Configuration</h3>

            <!-- Navbar was moved to top-nav in main -->

            <div class="section panel-connection">
                <h4>Vision Connection</h4>
                <div class="row">
                    <label>IP:</label>
                    <input type="text" id="vision-ip" value="224.5.23.2">
                </div>
                <div class="row">
                    <label>Port:</label>
                    <input type="number" id="vision-port" value="10020">
                </div>
                <div class="row">
                    <label>Status:</label>
                    <span id="vision-status" style="color:#f00; font-weight:bold;">Disconnected</span>
                </div>
                <div class="row" style="flex-direction:column; align-items:flex-start; margin-top:5px;">
                    <label style="font-size:0.8em; color:#aaa;">PPS History:</label>
                    <canvas id="pps-graph" width="180" height="40"
                        style="background:#222; border:1px solid #444; margin-top:2px;"></canvas>
                </div>
                <button id="btn-reconnect">Reconnect</button>
            </div>

            <div class="section panel-connection">
                <h4>Radio Configuration</h4>
                <div class="row">
                    <label>Port Name:</label>
                    <input type="text" id="radio-port-name" value="/dev/ttyUSB0">
                </div>
                <div class="row">
                    <label>Baud Rate:</label>
                    <input type="number" id="radio-baud-rate" value="115200">
                </div>
                <div class="row">
                    <label>Use Radio:</label>
                    <input type="checkbox" id="use-radio">
                </div>
                <button id="btn-update-radio">Update Radio</button>
            </div>

            <div class="section panel-connection">
                <h4>Kalman Filter</h4>
                <div class="row">
                    <label>Enabled:</label>
                    <input type="checkbox" id="kf-enabled" checked>
                </div>
                <div class="row">
                    <label>Proc. Noise (P):</label>
                    <input type="number" id="kf-pnoise-p" value="0.0000001" step="0.0000001">
                </div>
                <div class="row">
                    <label>Proc. Noise (V):</label>
                    <input type="number" id="kf-pnoise-v" value="0.0001" step="0.0001">
                </div>
                <div class="row">
                    <label>Meas. Noise:</label>
                    <input type="number" id="kf-mnoise" value="0.000001" step="0.000001">
                </div>
                <button id="btn-update-kf">Update KF</button>
            </div>

            <div class="section panel-control" style="display:none;">
                <h4>Manual Control Robot</h4>
                <div class="row">
                    <label>Mode:</label>
                    <select id="manual-control-mode" style="background:#3c3c3c; color:white; border:1px solid #555;">
                        <option value="xbox">Xbox</option>
                        <option value="keyboard">Keyboard</option>
                    </select>
                </div>
                <div class="row">
                    <label>Active:</label>
                    <input type="checkbox" id="xbox-active">
                </div>
                <div class="row">
                    <label>Team:</label>
                    <select id="xbox-team" style="background:#3c3c3c; color:white; border:1px solid #555;">
                        <option value="0">Blue</option>
                        <option value="1">Yellow</option>
                    </select>
                </div>
                <div class="row">
                    <label>Robot ID:</label>
                    <input type="number" id="xbox-id" value="0" min="0" max="15">
                </div>
                <div class="row">
                    <label>Scale Vx:</label>
                    <input type="number" id="manual-vel-scale-vx" value="1.0" step="0.1" style="width:45px;">
                </div>
                <div class="row">
                    <label>Scale Vy:</label>
                    <input type="number" id="manual-vel-scale-vy" value="1.0" step="0.1" style="width:45px;">
                </div>
                <div class="row">
                    <label>Scale Om:</label>
                    <input type="number" id="manual-vel-scale-w" value="1.0" step="0.1" style="width:45px;">
                </div>
                <div class="row">
                    <label>Vis. Velocities:</label>
                    <input type="checkbox" id="visualize-velocities">
                </div>
                <div id="xbox-status" style="font-size:0.8em; color:#888; margin-top:5px;">No controller</div>
            </div>

            <div class="section panel-control" style="display:none;">
                <h4>Path Following Test</h4>
                <div class="row">
                    <label>Draw Mode:</label>
                    <input type="checkbox" id="path-draw-mode">
                </div>
                <div class="row">
                    <label>Team:</label>
                    <select id="path-team" style="background:#3c3c3c; color:white; border:1px solid #555;">
                        <option value="0">Blue</option>
                        <option value="1">Yellow</option>
                    </select>
                </div>
                <div class="row">
                    <label>Robot ID:</label>
                    <input type="number" id="path-id" value="0" min="0" max="15">
                </div>
                <div class="row">
                    <label>Controller:</label>
                    <select id="path-controller" style="background:#3c3c3c; color:white; border:1px solid #555;">
                        <option value="pid">PID</option>
                        <option value="lookahead">LookAhead PID</option>
                        <option value="bangbang">BangBangTrajectories</option>
                    </select>
                </div>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button id="btn-path-clear">Clear Path</button>
                    <button id="btn-path-send" style="background-color:#2e7d32;">Send</button>
                </div>
            </div>

            <div class="section panel-connection">
                <h4>Recording</h4>
                <div class="row">
                    <input type="text" id="rec-filename" value="record.csv" style="width:100%">
                </div>
                <div style="display:flex; gap:5px;">
                    <button id="btn-record-start">Start</button>
                    <button id="btn-record-stop" class="stop" disabled>Stop</button>
                </div>
                <div id="rec-status" style="font-size:0.8em; color:#888; margin-top:5px;">Idle</div>
            </div>

        </div>

        <div id="main">
            <canvas id="fieldCanvas"></canvas>
            <div id="mouse-coords">0, 0</div>
            <div id="zoom-controls">
                <button id="btn-zoom-out">-</button>
                <button id="btn-zoom-in">+</button>
            </div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
